openapi: 3.1.0
info:
  title: Comfact Signature API
  description: |-
    This is the OpenAPI definition for the Comfact Signature API.
    Copyright (c) Comfact AB, Sweden.
    ALL RIGHTS RESERVED.

    #### Introduction
    Comfact Signature is an online electronic signature solution. It complies with the
    eIDAS Regulation and can be used for both Basic and Advanced Electronic Signatures.
    Comfact Signature is designed to be a "fire and forget" service. Once a signing
    instance has been created, the service will see to that signatories are notified,
    authenticated and guided through the document signing process. The end result, the
    electronically signed document, is then delivered back to the client application,
    preferably via webhooks. The API works the same for both JSON and XML payloads.

    #### Signing Instances
    The majority of the operations provided by the Comfact Signature API revolve
    around signing instances. A signing instance is a self-contained entity that
    holds all necessary information for a set of signatories to sign one or more
    documents. A signing instance belongs to an account in Comfact Signature. An
    account has a configuration where additional settings can be configured, such
    as tweaking texts in email and SMS notifications, switching signature type from
    Basic to Advanced or subscribing to webhooks. A client business application can
    have several accounts, configured for different scenarios, and then select the
    appropriate one in the API call when creating a new signing instance. All valid
    values for the status of a signing instance are listed below for reference.

    - `created` The signing instance has been created on persistent storage
    - `active` The signing instance is active and in a normal running state
    - `approved` All signatories have approved the document and attachments
    - `declined` A signatory has declined to sign the document or attachments
    - `completed` The signed documents have been produced and also validated
    - `withdrawn` The signing instance has been manually stopped by a user
    - `expired` The signing instance has expired and is no longer progressing
    - `halted` The signing instance has been automatically stopped by an error
    - `faulty` This status is currently unused but is reserved for future use

    #### System Languages
    Comfact Signature supports a wide range of languages. Languages are used when
    displaying texts on web pages, for email and SMS communications and when formatting
    numbers, dates and times. A system language is specified by an *ISO 639* language
    code, in conjunction with an *ISO 3166* country code. Currently supported languages
    are listed below. New languages are added as needed.

    - `bs-Latn-BA` Bosnian (Latin, Bosnia & Herzegovina)
    - `hr-HR` Croatian (Croatia)
    - `da-DK` Danish (Denmark)
    - `nl-NL` Dutch (Netherlands)
    - `en-US` English (United States)
    - `fi-FI` Finnish (Finland)
    - `fr-FR` French (France)
    - `de-DE` German (Germany)
    - `el-GR` Greek (Greece)
    - `hu-HU` Hungarian (Hungary)
    - `it-IT` Italian (Italy)
    - `nb-NO` Norwegian Bokmål (Norway)
    - `pt-PT` Portuguese (Portugal)
    - `ro-RO` Romanian (Romania)
    - `sr-Cyrl-RS` Serbian (Cyrillic, Serbia)
    - `sl-SI` Slovenian (Slovenia)
    - `es-ES` Spanish (Spain)
    - `sv-SE` Swedish (Sweden)
    - `uk-UA` Ukrainian (Ukraine)

    #### Signatory Authentication
    Signatories are required to be authenticated before being allowed access to documents
    in a signing instance. Generally available authentication methods are listed below.
    Other authentication methods are made available on a per-customer basis. Some methods
    can only be used in combination with Basic Electronic Signatures, while others can be
    used with both Basic and Advanced Electronic Signatures. Signature type is selected
    per signing instance, but authentication methods are selected per signatory. Mixing
    authentication methods in a signing instance can be useful in an international context.

    - `EmailCode` One-time password via email (*Basic Electronic Signatures*)
    - `SmsCode` One-time password via SMS (*Basic Electronic Signatures*)
    - `SvensktEId` Swedish e-identification (*Basic or Advanced Electronic Signatures*)
    - `SwedenConnect` European e-identification (*Basic or Advanced Electronic Signatures*)
    - `SITHS` Swedish healthcare e-identification (*Basic or Advanced Electronic Signatures*)

    #### Rate Limiting
    Comfact Signature uses rate limiting and throttling to ensure fair access to server
    resources and to protect against excessive or malicious use. Rate limiting is applied
    to the API as well as the OAuth 2.0 token endpoint. The API permits a few calls per
    second and a few hundred calls per minute. The rate limit on the OAuth 2.0 token endpoint
    is considerably lower. Some general tips and recommendations to avoid being throttled:

    - Cache your OAuth 2.0 access token for reuse. It is valid for a couple of hours
    - If possible, implement webhooks instead of using automated polling of the API
    - A signing instance can be big. Work with signing instance infos where possible
    - Handle the HTTP 429 TooManyRequests response and hold making further calls

    #### Data Retention

    Signing instances are not kept forever by Comfact Signature. A signing instance often
    holds personal information about its signatories as well as business data and other
    potentially sensitive information. Signing instances are therefore deleted from the
    system on a pre-defined schedule. Default deletion time is one week after the signing
    instance has reached its expiry date. Deletion time is configurable on your account.

    #### Versioning
    This API definition uses *Semantic Versioning* (SemVer) to allow new features and
    fixes to be added in a backwards-compatible way. The version number is described on
    the *Major.Minor.Patch* form. The *Minor* version will increment when new features
    are added. The *Patch* version will increment when bug fixes are added. The *Major*
    version will effectively never change, as a new API definition is created instead.
    Changes to the API may come in the form of new operations or components, additional
    (optional) properties on existing resources, or updates to documentation. Changes
    between API versions are listed below.

    - **3.0.0** Initial version of this API definition, exposing standard functionality.
    - **3.1.0** New feature to enable reactivation of a signing instance that is halted.
    - **3.2.0** New feature to search and filter signing instances by group affiliation.
    - **3.3.0** New feature to restrict access to the API by including OAuth 2.0 scopes.
    - **3.4.0** New feature to return a signatory to a particular web page after signing.
    - **3.5.0** New feature to support OAuth 2.0 bearer authentication for webhooks.
    - **3.5.1** Fix for Location header incorrectly listed as part of HTTP 200 response.
    - **3.6.1** New feature to expose the date when a signing instance will be deleted.
  termsOfService: https://www.comfact.com/signingwebsite/home/termsofuse
  contact:
    name: Comfact AB
    url: https://www.comfact.se
    email: support@comfact.com
  version: 3.6.1
externalDocs:
  description: Find out more about Comfact Signature
  url: https://www.comfact.se/services/signature
servers:
  - url: https://www.comfact.com/signingservice
    description: Production environment (Cloud)
  - url: https://app.comfact.se/signingservice
    description: Production environment (Sweden)
  - url: https://test.comfact.com/signingservice
    description: Test environment (Sweden)
  - url: https://local.comfact.com/signingservice
    description: Development environment (Sweden)
tags:
  - name: Signing Instances
    description: Operations on the top level signing instance resources.
  - name: Signing Instance Infos
    description: Operations to search and filter signing instance infos.
  - name: Reminders
    description: Operations on automatic and manual signatory reminders.
  - name: Signatories
    description: Operations on the signatories of a signing instance.
  - name: Documents
    description: Operations on the documents of a signing instance.
paths:
  /api/v3/signing-instances:
    post:
      tags:
        - Signing Instances
      summary: Creates a new signing instance based on the provided input model.
      description: |-
        #### Introduction
        The input model used for creating a new signing instance has several properties,
        but only a few of these are mandatory. There must be at least one document to be
        signed and there must be at least one signatory. Most other properties are optional
        but can be specified to improve on privacy, secrecy or the overall user experience.
        See the examples for how the input model may look in some common scenarios.

        #### Return Links
        Once a signatory has completed the signing process, they can be presented a link
        that will take them back to your business application. You can provide one link
        for when the signatory approves the document and another for when the signatory
        declines. The signatory can also be redirected to your web pages automatically,
        without having to click on the links. Both links may contain a substitution key
        in the URL that is replaced with the ID of the signing instance before use.

        - `{{SigningInstanceId}}`

        See the relevant example on how return links and substitution keys can be used.
      operationId: CreateSigningInstance
      requestBody:
        $ref: '#/components/requestBodies/SigningInstanceInput'
      responses:
        '201':
          $ref: '#/components/responses/SigningInstanceSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/GeneralError'
  /api/v3/signing-instances/{signingInstanceId}:
    get:
      tags:
        - Signing Instances
      summary: Gets the complete signing instance that matches the specified ID.
      operationId: GetSigningInstance
      parameters:
        - $ref: '#/components/parameters/signingInstanceId'
      responses:
        '200':
          $ref: '#/components/responses/SigningInstance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/GeneralError'
    patch:
      tags:
        - Signing Instances
      summary: Updates a target signing instance based on the provided patch model.
      description: |-
        #### Introduction
        This operation can be used for updating, or patching, some of the simple properties
        of a signing instance. More complex sub-resources, such as signatories, are patched
        using other operations. Whether a signing instance can be patched or not is very much
        determined by its current status. For example, it is not allowed to patch the expiry
        date of a completed signing instance, but patching it on an expired signing instance
        is, effectively reactivating it and extending its lifetime. Some common scenarios where
        patching is possible, and the required status of the signing instance, are listed below.

        #### Withdraw
        A signing instance can be withdrawn by patching its status. A signing instance that
        is in a withdrawn state has been manually stopped from progressing any further. No
        signatories are allowed access to view or sign the documents and no signed documents
        will be produced. The target signing instance must have one of the following statuses
        for it to be withdrawn.

        - `active`
        - `halted`

        #### Extend
        The expiry date of a signing instance can be extended through patching. The new
        expiry date must be greater than the current value. In case the signing instance
        is already in an expired state, extending the expiry date will also reactivate
        the signing instance into an active state. The signing instance must have one of
        the following statuses to extend the expiry date.

        - `active`
        - `expired`

        #### Reactivate
        A signing instance can be reactivated by patching its status. Reactivation can only
        be performed on a signing instance that is in a halted state. A signing instance
        becomes halted if an error occurs that will prevent it from becoming completed.
        A signing instance that has been reactivated often requires additional updates to
        correct any erroneous data, such as an incorrect or misspelled email address. The
        signing instance must have one of the following statuses to permit reactivation.

        - `halted`

        #### Remarks
        This operation can also be reached via the HTTP POST method by including
        a custom header named `X-HTTP-Method-Override` with the value `PATCH`.
      operationId: UpdateSigningInstance
      parameters:
        - $ref: '#/components/parameters/signingInstanceId'
      requestBody:
        $ref: '#/components/requestBodies/SigningInstancePatch'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/GeneralError'
  /api/v3/signing-instance-infos/{signingInstanceId}:
    get:
      tags:
        - Signing Instance Infos
      summary: Gets the signing instance info summary matching the specified ID.
      operationId: GetSigningInstanceInfo
      parameters:
        - $ref: '#/components/parameters/signingInstanceId'
      responses:
        '200':
          $ref: '#/components/responses/SigningInstanceInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/GeneralError'
  /api/v3/signing-instance-infos/search-filters:
    post:
      tags:
        - Signing Instance Infos
      summary: Creates and applies a search filter on signing instance infos.
      operationId: CreateSearchFilter
      requestBody:
        $ref: '#/components/requestBodies/SearchFilter'
      responses:
        '200':
          $ref: '#/components/responses/SearchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/GeneralError'
  /api/v3/signing-instances/{signingInstanceId}/automatic-reminder:
    get:
      tags:
        - Reminders
      summary: Gets the automatic reminder currently set on the signing instance.
      operationId: GetAutomaticReminder
      parameters:
        - $ref: '#/components/parameters/signingInstanceId'
      responses:
        '200':
          $ref: '#/components/responses/AutomaticReminder'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/GeneralError'
    put:
      tags:
        - Reminders
      summary: Sets the provided automatic reminder on the signing instance.
      description: |-
        #### Remarks
        This operation can also be reached via the HTTP POST method by including
        a custom header named `X-HTTP-Method-Override` with the value `PUT`.
      operationId: SetAutomaticReminder
      parameters:
        - $ref: '#/components/parameters/signingInstanceId'
      requestBody:
        $ref: '#/components/requestBodies/AutomaticReminder'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/GeneralError'
  /api/v3/signing-instances/{signingInstanceId}/manual-reminders:
    post:
      tags:
        - Reminders
      summary: Creates and sends a manual reminder to the selected signatories.
      operationId: CreateManualReminder
      parameters:
        - $ref: '#/components/parameters/signingInstanceId'
      requestBody:
        $ref: '#/components/requestBodies/ManualReminder'
      responses:
        '202':
          $ref: '#/components/responses/Accepted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/GeneralError'
  /api/v3/signing-instances/{signingInstanceId}/signatories:
    get:
      tags:
        - Signatories
      summary: Gets the signatories matching the filter from the signing instance.
      operationId: GetSignatories
      parameters:
        - $ref: '#/components/parameters/signingInstanceId'
        - $ref: '#/components/parameters/signatoryFilter'
      responses:
        '200':
          $ref: '#/components/responses/Signatories'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/GeneralError'
  /api/v3/signing-instances/{signingInstanceId}/signatories/{partyId}:
    get:
      tags:
        - Signatories
      summary: Gets the signatory with the specified ID from the signing instance.
      operationId: GetSignatory
      parameters:
        - $ref: '#/components/parameters/signingInstanceId'
        - $ref: '#/components/parameters/partyId'
      responses:
        '200':
          $ref: '#/components/responses/Signatory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/GeneralError'
    patch:
      tags:
        - Signatories
      summary: Updates the target signatory based on the provided patch model.
      description: |-
        #### Remarks
        This operation can also be reached via the HTTP POST method by including
        a custom header named `X-HTTP-Method-Override` with the value `PATCH`.
      operationId: UpdateSignatory
      parameters:
        - $ref: '#/components/parameters/signingInstanceId'
        - $ref: '#/components/parameters/partyId'
      requestBody:
        $ref: '#/components/requestBodies/SignatoryPatch'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/GeneralError'
  /api/v3/signing-instances/{signingInstanceId}/original-documents:
    get:
      tags:
        - Documents
      summary: Gets all the original documents from the target signing instance.
      operationId: GetOriginalDocuments
      parameters:
        - $ref: '#/components/parameters/signingInstanceId'
      responses:
        '200':
          $ref: '#/components/responses/OriginalDocuments'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/GeneralError'
  /api/v3/signing-instances/{signingInstanceId}/signed-documents:
    get:
      tags:
        - Documents
      summary: Gets all the signed documents from the target signing instance.
      operationId: GetSignedDocuments
      parameters:
        - $ref: '#/components/parameters/signingInstanceId'
      responses:
        '200':
          $ref: '#/components/responses/SignedDocuments'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        default:
          $ref: '#/components/responses/GeneralError'
webhooks:
  event-notifications:
    post:
      summary: Creates and handles an event notification from a signing instance.
      description: |-
        #### Introduction
        Webhooks are callbacks from Comfact Signature to your business application.
        A request to a webhook endpoint is triggered when an event has occurred in
        one of your signing instances. There is a defined set of events that you can
        subscribe to. You can choose to subscribe to all, none or only some of these
        events. Webhooks settings are handled in the configuration of your account.

        #### Retry Policy
        If your webhook endpoint responds with anything other than HTTP 200 OK for
        a request, the call is considered a failure by Comfact Signature. A failed
        request is retried every half hour, for a maximum period of **48** hours.
      operationId: CreateEventNotification
      security:
        - BasicAuthentication: []
        - OAuth2ClientCredentials: []
        - BearerAuthentication: []
      requestBody:
        $ref: '#/components/requestBodies/EventNotification'
      responses:
        '200':
          $ref: '#/components/responses/OK'
        default:
          $ref: '#/components/responses/GeneralError'
components:
  parameters:
    signingInstanceId:
      description: The ID of the target signing instance resource.
      name: signingInstanceId
      in: path
      required: true
      schema:
        type: string
    signatoryFilter:
      description: The indicator for filtering the set of signatories.
      name: signatoryFilter
      in: query
      schema:
        $ref: '#/components/schemas/SignatoryFilter'
        default: all
    partyId:
      description: The ID of the target party or signatory resource.
      name: partyId
      in: path
      required: true
      schema:
        type: string
  requestBodies:
    SigningInstanceInput:
      description: The input model to base the new signing instance on.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SigningInstanceInput'
          examples:
            SimpleSigningInstanceInput:
              $ref: '#/components/examples/SimpleSigningInstanceInput'
            PrivacySigningInstanceInput:
              $ref: '#/components/examples/PrivacySigningInstanceInput'
            ReturnLinkSigningInstanceInput:
              $ref: '#/components/examples/ReturnLinkSigningInstanceInput'
        application/xml:
          schema:
            $ref: '#/components/schemas/SigningInstanceInput'
          examples:
            SimpleSigningInstanceInput:
              $ref: '#/components/examples/SimpleSigningInstanceInput'
            PrivacySigningInstanceInput:
              $ref: '#/components/examples/PrivacySigningInstanceInput'
            ReturnLinkSigningInstanceInput:
              $ref: '#/components/examples/ReturnLinkSigningInstanceInput'
    SigningInstancePatch:
      description: The patch model containing the properties to update.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SigningInstancePatch'
          examples:
            WithdrawSigningInstancePatch:
              $ref: '#/components/examples/WithdrawSigningInstancePatch'
            ReactivateSigningInstancePatch:
              $ref: '#/components/examples/ReactivateSigningInstancePatch'
        application/xml:
          schema:
            $ref: '#/components/schemas/SigningInstancePatch'
          examples:
            WithdrawSigningInstancePatch:
              $ref: '#/components/examples/WithdrawSigningInstancePatch'
            ReactivateSigningInstancePatch:
              $ref: '#/components/examples/ReactivateSigningInstancePatch'
    SearchFilter:
      description: The search filter with the predicates and paginator to apply.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SearchFilter'
          examples:
            ExactSearchFilter:
              $ref: '#/components/examples/ExactSearchFilter'
            PaginatedSearchFilter:
              $ref: '#/components/examples/PaginatedSearchFilter'
        application/xml:
          schema:
            $ref: '#/components/schemas/SearchFilter'
          examples:
            ExactSearchFilter:
              $ref: '#/components/examples/ExactSearchFilter'
            PaginatedSearchFilter:
              $ref: '#/components/examples/PaginatedSearchFilter'
    AutomaticReminder:
      description: The automatic reminder to set on the signing instance.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AutomaticReminder'
          examples:
            EnableAutomaticReminder:
              $ref: '#/components/examples/EnableAutomaticReminder'
            RemoveAutomaticReminder:
              $ref: '#/components/examples/RemoveAutomaticReminder'
        application/xml:
          schema:
            $ref: '#/components/schemas/AutomaticReminder'
          examples:
            EnableAutomaticReminder:
              $ref: '#/components/examples/EnableAutomaticReminder'
            RemoveAutomaticReminder:
              $ref: '#/components/examples/RemoveAutomaticReminder'
    ManualReminder:
      description: The model that describes the manual reminder settings.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ManualReminder'
          examples:
            QuickManualReminder:
              $ref: '#/components/examples/QuickManualReminder'
            TargetedManualReminder:
              $ref: '#/components/examples/TargetedManualReminder'
        application/xml:
          schema:
            $ref: '#/components/schemas/ManualReminder'
          examples:
            QuickManualReminder:
              $ref: '#/components/examples/QuickManualReminder'
            TargetedManualReminder:
              $ref: '#/components/examples/TargetedManualReminder'
    SignatoryPatch:
      description: The patch model containing the properties to update.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SignatoryPatch'
          examples:
            EmailSignatoryPatch:
              $ref: '#/components/examples/EmailSignatoryPatch'
            ReplaceSignatoryPatch:
              $ref: '#/components/examples/ReplaceSignatoryPatch'
        application/xml:
          schema:
            $ref: '#/components/schemas/SignatoryPatch'
          examples:
            EmailSignatoryPatch:
              $ref: '#/components/examples/EmailSignatoryPatch'
            ReplaceSignatoryPatch:
              $ref: '#/components/examples/ReplaceSignatoryPatch'
    EventNotification:
      description: Information about the event in the signing instance.
      required: true
      content:
        application/json:
          schema:
