  responses:
    SigningInstanceSummary:
      description: The summary representation of the signing instance.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SigningInstanceInfo'
        application/xml:
          schema:
            $ref: '#/components/schemas/SigningInstanceInfo'
      headers:
        Location:
          description: The URL to the created signing instance resource.
          schema:
            type: string
    SigningInstance:
      description: The signing instance that matches the specified ID.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SigningInstance'
        application/xml:
          schema:
            $ref: '#/components/schemas/SigningInstance'
    SigningInstanceInfo:
      description: The signing instance info matching the specified ID.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SigningInstanceInfo'
        application/xml:
          schema:
            $ref: '#/components/schemas/SigningInstanceInfo'
    SearchResult:
      description: The paginated search result of signing instance infos.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SearchResult'
        application/xml:
          schema:
            $ref: '#/components/schemas/SearchResult'
    AutomaticReminder:
      description: The automatic reminder settings in the signing instance.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AutomaticReminder'
        application/xml:
          schema:
            $ref: '#/components/schemas/AutomaticReminder'
    Signatories:
      description: The container with the signatories matching the filter.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SignatoriesContainer'
        application/xml:
          schema:
            $ref: '#/components/schemas/SignatoriesContainer'
    Signatory:
      description: The signatory that matches the specified party ID.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Signatory'
        application/xml:
          schema:
            $ref: '#/components/schemas/Signatory'
    OriginalDocuments:
      description: The container with the original document and attachments.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OriginalDocuments'
        application/xml:
          schema:
            $ref: '#/components/schemas/OriginalDocuments'
    SignedDocuments:
      description: The container with the signed document and attachments.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SignedDocuments'
        application/xml:
          schema:
            $ref: '#/components/schemas/SignedDocuments'
    OK:
      description: The requested service operation was successfully completed.
    Accepted:
      description: The request has been accepted and queued for processing.
    NoContent:
      description: The request succeeded and the response is intentionally blank.
    BadRequest:
      description: The supplied input is invalid or could not be understood.
    Unauthorized:
      description: The client is not authenticated for accessing the service.
      headers:
        WWW-Authenticate:
          description: The HTTP authentication schemes supported by the service.
          schema:
            type: string
    Forbidden:
      description: The client is not authorized for accessing the operation.
    NotFound:
      description: The requested resource could not be found in the system.
    Conflict:
      description: The resource state prevents the request from being completed.
    TooManyRequests:
      description: The client has sent too many requests in a given amount of time.
      headers:
        Retry-After:
          description: The number of seconds to wait before attempting a new request.
          schema:
            type: integer
    GeneralError:
      description: An error occurred not covered by the existing error codes.
  schemas:
    Action:
      description: Indicates if a signatory has approved or declined to sign.
      type: string
      enum:
        - approved
        - declined
      xml:
        namespace: 'urn:comfact:signature:3:core'
    AutomaticReminder:
      description: Settings for sending automatic reminders to signatories.
      type: object
      required:
        - hourInterval
        - enabled
      properties:
        startDate:
          description: Date and time when sending automatic reminders will start.
          type: string
          format: date-time
          xml:
            name: StartDate
        hourInterval:
          description: The hourly interval between automatic signatory reminders.
          type: integer
          format: int32
          minimum: 24
          examples: [48]
          xml:
            name: HourInterval
        reminderMessages:
          description: Text messages included in the reminders to signatories.
          type: array
          items:
            $ref: '#/components/schemas/Message'
          xml:
            name: ReminderMessage
        enabled:
          description: Whether automatic reminders are currently in effect.
          type: boolean
          xml:
            attribute: true
      xml:
        namespace: 'urn:comfact:signature:3:core'
    DistributionMethod:
      description: Indicates how to distribute the signed documents to a signatory.
      type: string
      enum:
        - none
        - attached
        - download
      xml:
        namespace: 'urn:comfact:signature:3:core'
    DistributionStatus:
      description: Tracks the status of a document distribution task for a signatory.
      type: object
      properties:
        completed:
          description: Indicates if the distribution task has been fully completed.
          type: boolean
          default: false
          xml:
            attribute: true
        timestamp:
          description: Date and time when the distribution task was completed.
          type: string
          format: date-time
          xml:
            attribute: true
      xml:
        namespace: 'urn:comfact:signature:3:core'
    Document:
      description: The model for representing a document in a signing instance.
      type: object
      required:
        - mimeType
        - content
      properties:
        documentName:
          description: The document name, or title, displayed in user interfaces.
          type: string
          xml:
            name: DocumentName
        fileName:
          description: The filename used when the document is handled as a file.
          type: string
          xml:
            name: FileName
        encoding:
          description: Any applicable character encoding (IANA) of the content.
          type: string
          examples: ['UTF-8']
          xml:
            name: Encoding
        mimeType:
          description: The MIME type (IANA) indicating the format of the content.
          type: string
          examples: ['application/pdf']
          xml:
            name: MimeType
        content:
          description: The raw data bytes holding the actual document content.
          type: string
          format: byte
          xml:
            name: Content
        documentId:
          description: A unique ID of the document in the parent signing instance.
          type: string
          xml:
            attribute: true
      xml:
        namespace: 'urn:comfact:signature:3:core'
    Event:
      description: Describes an event that has occurred in a signing instance.
      type: object
      required:
        - severity
        - timestamp
      properties:
        code:
          description: The code identifying the action that created the event.
          type: string
          xml:
            name: Code
        message:
          description: A human-readable description of the event that occurred.
          type: string
          xml:
            name: Message
        severity:
          description: The severity of the event for the parent signing instance.
          $ref: '#/components/schemas/Severity'
          xml:
            attribute: true
        timestamp:
          description: Date and time when the event occurred in the signing instance.
          type: string
          format: date-time
          xml:
            attribute: true
      xml:
        namespace: 'urn:comfact:signature:3:core'
    EventNotification:
      description: A model for notifying a webhook about a signing instance event.
      type: object
      required:
        - eventTrigger
        - signingInstanceInfo
        - timestamp
      properties:
        eventTrigger:
          description: The trigger that initiated the webhook event notification.
          $ref: '#/components/schemas/EventTrigger'
          xml:
            name: EventTrigger
        signingInstanceInfo:
          description: The summary representation of the affected signing instance.
          $ref: '#/components/schemas/SigningInstanceInfo'
          xml:
            name: SigningInstanceInfo
        signatoryInfo:
          description: Information about the signatory that approved or declined.
          $ref: '#/components/schemas/SignatoryInfo'
          xml:
            name: SignatoryInfo
        signedDocument:
          description: Signed version of the original document and its attachments.
          $ref: '#/components/schemas/Document'
          xml:
            name: SignedDocument
        signedDocumentAttachments:
          description: Signed attachments are only available in custom scenarios.
          type: array
          items:
            $ref: '#/components/schemas/Document'
          xml:
            name: SignedDocumentAttachment
        timestamp:
          description: Date and time when the event notification was triggered.
          type: string
          format: date-time
          xml:
            attribute: true
      xml:
        namespace: 'urn:comfact:signature:3:core'
    EventTrigger:
      description: Indicates the trigger that caused a webhook event notification.
      type: string
      enum:
        - signingInstanceCreated
        - signatoryActionApproved
        - signatoryActionDeclined
        - signingInstanceCompleted
        - signingInstanceWithdrawn
        - signingInstanceExpired
        - signingInstanceHalted
        - signingInstanceReactivated
      xml:
        namespace: 'urn:comfact:signature:3:core'
    Initiator:
      description: The model representing the contact person in a signing instance.
      allOf:
        - $ref: '#/components/schemas/Party'
      type: object
      required:
        - emailAddress
      properties:
        distributionEnabled:
          description: Whether to distribute signed documents as email attachments.
          type: boolean
          default: true
          xml:
            name: DistributionEnabled
      xml:
        namespace: 'urn:comfact:signature:3:core'
    Log:
      description: Holds the events that have been logged for a signing instance.
      type: object
      properties:
        events:
          description: The events that have been logged for the signing instance.
          type: array
          items:
            $ref: '#/components/schemas/Event'
          xml:
            name: Event
      xml:
        namespace: 'urn:comfact:signature:3:core'
    ManualReminder:
      description: The model for sending manual reminders to signatories.
      type: object
      properties:
        partyId:
          description: The party ID of any particular signatory to target.
          type: string
          xml:
            name: PartyId
        reminderMessages:
          description: The text messages included in the reminders to send.
          type: array
          items:
            $ref: '#/components/schemas/Message'
          xml:
            name: ReminderMessage
      xml:
        namespace: 'urn:comfact:signature:3:core'
    Message:
      description: A human-readable text message with a subject and a body.
      type: object
      required:
        - language
      properties:
        subject:
          description: The text to use as the subject line of the message.
          type: string
          xml:
            name: Subject
        body:
          description: The text to use as the body content of the message.
          type: string
          xml:
            name: Body
        language:
          description: The language (ISO 639, ISO 3166) used in the message.
          type: string
          examples: ['sv-SE']
          xml:
            attribute: true
      xml:
        namespace: 'urn:comfact:signature:3:core'
    Operator:
      description: Comparison operators available for filter predicates.
      type: string
      enum:
        - equalTo
        - notEqualTo
        - greaterThan
        - lessThan
      xml:
        namespace: 'urn:comfact:signature:3:core'
    OriginalDocuments:
      description: A container with the original documents of a signing instance.
      type: object
      required:
        - document
      properties:
        document:
          description: The main document to be approved by all the signatories.
          $ref: '#/components/schemas/Document'
          xml:
            name: Document
        documentAttachments:
          description: Any attachments to also be approved by all signatories.
          type: array
          items:
            $ref: '#/components/schemas/Document'
          xml:
            name: DocumentAttachment
      xml:
        namespace: 'urn:comfact:signature:3:core'
    Paginator:
      description: The model used for page-based pagination and sorting.
      type: object
      required:
        - page
      properties:
        page:
          description: The zero-based index of the current page.
          type: integer
          format: int32
          minimum: 0
          xml:
            name: Page
        pageSize:
          description: The maximum number of items returned per page.
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          default: 50
          xml:
            name: PageSize
        totalItems:
          description: The total number of items in the result set.
          type: integer
          format: int32
          readOnly: true
          xml:
            name: TotalItems
        orderByProperty:
          description: The property to order the result set by.
          $ref: '#/components/schemas/Property'
          default: created
          xml:
            name: OrderByProperty
        orderByDescending:
          description: Indicates descending or ascending sort order.
          type: boolean
          default: true
          xml:
            name: OrderByDescending
      xml:
        namespace: 'urn:comfact:signature:3:core'
    Party:
      description: The model representing a participant in a signing instance.
      type: object
      properties:
        name:
          description: The full name of the person represented by this party.
          type: string
          xml:
            name: Name
        title:
          description: The title of the person represented by this party.
          type: string
          xml:
            name: Title
        organization:
          description: The organization that this person may be representing.
          type: string
          xml:
            name: Organization
        emailAddress:
          description: The email address to use when sending email notifications.
          type: string
          format: email
          xml:
            name: EmailAddress
        mobilePhoneNumber:
          description: The mobile phone number (E.164) to use for notifications.
          type: string
          examples: ['+46701740605']
          xml:
            name: MobilePhoneNumber
        partyId:
          description: A unique ID of the party in the parent signing instance.
          type: string
          xml:
            attribute: true
        language:
          description: The language (ISO 639, ISO 3166) to use in notifications.
          type: string
          examples: ['sv-SE']
          xml:
            attribute: true
      xml:
        namespace: 'urn:comfact:signature:3:core'
    PartyPatch:
      description: The patch model for updating a party in a signing instance.
      type: object
      properties:
        name:
          description: The full name of the person represented by this party.
          type: string
          xml:
            name: Name
        title:
          description: The title of the person represented by this party.
          type: string
          xml:
            name: Title
        organization:
          description: The organization that this person may be representing.
          type: string
          xml:
            name: Organization
        emailAddress:
          description: The email address to use when sending email notifications.
          type: string
          format: email
          xml:
            name: EmailAddress
        mobilePhoneNumber:
          description: The mobile phone number (E.164) to use for notifications.
          type: string
          examples: ['+46701740605']
          xml:
            name: MobilePhoneNumber
      xml:
        namespace: 'urn:comfact:signature:3:core'
    Predicate:
      description: A logical expression applied on a signing instance info.
      type: object
      required:
        - property
        - operator
        - value
      properties:
        property:
          description: The target property of the signing instance info.
          $ref: '#/components/schemas/Property'
          xml:
            name: Property
        operator:
          description: The comparison operation to perform on the values.
          $ref: '#/components/schemas/Operator'
          xml:
            name: Operator
        value:
          description: The value to compare the target property value to.
          type: string
          xml:
            name: Value
      xml:
        namespace: 'urn:comfact:signature:3:core'
    Property:
      description: Properties that can be targeted for filtering and sorting.
      type: string
      enum:
        - customerReferenceNumber
        - expires
        - accountId
        - userId
        - groupId
        - status
        - referenceNumber
        - created
        - changed
        - deleted
        - signingInstanceId
      xml:
        namespace: 'urn:comfact:signature:3:core'
    ReturnLink:
      description: A link to a web page to redirect a signatory to after signing.
      type: object
      required:
        - text
        - url
      properties:
        text:
          description: The display text of the link presented to the signatory.
          type: string
          xml:
            name: Text
        url:
          description: The absolute URL of the link presented to the signatory.
          type: string
          xml:
            name: Url
        autoRedirect:
          description: Whether to redirect the signatory to the URL automatically.
          type: boolean
          default: false
          xml:
            attribute: true
      xml:
        namespace: 'urn:comfact:signature:3:core'
    SearchFilter:
      description: The model for filtering and sorting signing instance infos.
      type: object
      required:
        - paginator
      properties:
        predicates:
          description: The predicates to evaluate for each signing instance info.
          type: array
          items:
            $ref: '#/components/schemas/Predicate'
          xml:
            name: Predicate
        paginator:
          description: The paginator describing the current pagination state.
          $ref: '#/components/schemas/Paginator'
          xml:
            name: Paginator
      xml:
        namespace: 'urn:comfact:signature:3:core'
    SearchResult:
      description: The model holding a paginated result set from a filter.
      type: object
      required:
        - paginator
      properties:
        signingInstanceInfos:
          description: The current page of matching signing instance infos.
          type: array
          items:
            $ref: '#/components/schemas/SigningInstanceInfo'
          xml:
            name: SigningInstanceInfo
        paginator:
          description: The paginator describing the current pagination state.
          $ref: '#/components/schemas/Paginator'
          xml:
            name: Paginator
      xml:
        namespace: 'urn:comfact:signature:3:core'
    SecrecySettings:
      description: Settings related to document secrecy in a signing instance.
      type: object
      properties:
        notificationTexts:
          description: The texts used when notifying signatories about secrecy.
          type: array
          items:
            $ref: '#/components/schemas/Text'
          xml:
            name: NotificationText
        documentDownloadEnabled:
          description: Whether the documents may be downloaded by signatories.
          type: boolean
          default: false
          xml:
            attribute: true
        documentPrintingEnabled:
          description: Whether the documents may be printed by signatories.
          type: boolean
          default: false
          xml:
            attribute: true
      xml:
        namespace: 'urn:comfact:signature:3:core'
    Severity:
      description: Defines the severity of an event in a signing instance log.
      type: string
      enum:
        - information
        - warning
        - error
        - critical
      xml:
        namespace: 'urn:comfact:signature:3:core'
    SignatoriesContainer:
      description: A container with the set of signatories matching a filter.
      type: object
      properties:
        signatories:
          description: The set of signatories that matched the input filter.
          type: array
          items:
            $ref: '#/components/schemas/Signatory'
          xml:
            name: Signatory
      xml:
        namespace: 'urn:comfact:signature:3:core'
    Signatory:
      description: The model representing a document signer in a signing instance.
      allOf:
        - $ref: '#/components/schemas/Party'
      type: object
      required:
        - authenticationMethods
      properties:
        personalNumber:
          description: National identification number used in eID authentication.
          type: string
          xml:
            name: PersonalNumber
        accountId:
          description: An account ID for authentication using a custom provider.
          type: string
          xml:
            name: AccountId
        notificationMessage:
          description: The message to include in notifications to this signatory.
          $ref: '#/components/schemas/Message'
          xml:
            name: NotificationMessage
        authenticationMethods:
          description: The authentication methods allowed for this signatory.
          type: array
          minItems: 1
          items:
            type: string
          examples: [['EmailCode', 'SmsCode', 'SvensktEId', 'SwedenConnect']]
          xml:
            name: AuthenticationMethod
        signatoryUrl:
          description: The absolute URL to the landing page for this signatory.
          type: string
          readOnly: true
          xml:
            name: SignatoryUrl
        signatoryAction:
          description: Only present once the signatory has approved or declined.
          $ref: '#/components/schemas/SignatoryAction'
          readOnly: true
          xml:
            name: SignatoryAction
        approvedReturnLink:
          description: The link to return the signatory to when they have approved.
          $ref: '#/components/schemas/ReturnLink'
          xml:
            name: ApprovedReturnLink
        declinedReturnLink:
          description: The link to return the signatory to when they have declined.
          $ref: '#/components/schemas/ReturnLink'
          xml:
            name: DeclinedReturnLink
        distributionMethod:
          description: Indicates how the signed documents are distributed by email.
          $ref: '#/components/schemas/DistributionMethod'
          default: attached
          xml:
            name: DistributionMethod
        distributionStatus:
          description: Status of the distribution task when using the download method.
          $ref: '#/components/schemas/DistributionStatus'
          readOnly: true
          xml:
            name: DistributionStatus
      xml:
        namespace: 'urn:comfact:signature:3:core'
    SignatoryAction:
      description: Action indicating whether a signatory has approved or declined.
      type: object
      required:
        - action
        - timestamp
      properties:
        reason:
          description: The reason given for either approving or declining.
          type: string
          xml:
            name: Reason
        action:
          description: Main indicator for the action taken by the signatory.
          $ref: '#/components/schemas/Action'
          xml:
            attribute: true
        timestamp:
          description: Date and time when the signatory action was registered.
          type: string
          format: date-time
          xml:
            attribute: true
      xml:
        namespace: 'urn:comfact:signature:3:core'
    SignatoryFilter:
      description: An indicator for filtering signatories in a signing instance.
      type: string
      enum:
        - all
        - active
      xml:
        namespace: 'urn:comfact:signature:3:core'
    SignatoryInfo:
      description: The summary representation of a signatory in a signing instance.
      allOf:
        - $ref: '#/components/schemas/Party'
      type: object
      required:
        - partyId
      properties:
        personalNumber:
          description: National identification number used in eID authentication.
          type: string
          xml:
            name: PersonalNumber
        accountId:
          description: An account ID for authentication using a custom provider.
          type: string
          xml:
            name: AccountId
        signatoryAction:
          description: Only present once the signatory has approved or declined.
          $ref: '#/components/schemas/SignatoryAction'
          xml:
            name: SignatoryAction
      xml:
        namespace: 'urn:comfact:signature:3:core'
    SignatoryPatch:
      description: The patch model for updating a signatory in a signing instance.
      allOf:
        - $ref: '#/components/schemas/PartyPatch'
      type: object
      properties:
        personalNumber:
          description: National identification number used in eID authentication.
          type: string
          xml:
            name: PersonalNumber
        accountId:
          description: An account ID for authentication using a custom provider.
          type: string
          xml:
            name: AccountId
      xml:
        namespace: 'urn:comfact:signature:3:core'
    SignedDocuments:
      description: A container with the signed documents of a signing instance.
      type: object
      properties:
        signedDocument:
          description: Signed version of the original document and its attachments.
          $ref: '#/components/schemas/Document'
          xml:
            name: SignedDocument
        signedDocumentAttachments:
          description: Signed attachments are only available in custom scenarios.
          type: array
          items:
            $ref: '#/components/schemas/Document'
          xml:
            name: SignedDocumentAttachment
      xml:
        namespace: 'urn:comfact:signature:3:core'
    SigningInstance:
      description: A self-contained entity describing a document signing process.
      allOf:
        - $ref: '#/components/schemas/SigningInstanceInput'
      type: object
      required:
        - expires
        - accountId
        - userId
        - status
        - referenceNumber
        - created
        - changed
        - deleted
        - signingInstanceId
      properties:
        userId:
          description: The unique ID of the user that owns the signing instance.
          type: string
          xml:
            name: UserId
        groupId:
          description: The ID of the group to which the signing instance belongs.
          type: string
          xml:
            name: GroupId
        status:
          description: Indicates the overall status of the signing instance.
          $ref: '#/components/schemas/Status'
          xml:
            name: Status
        referenceNumber:
          description: A user-friendly reference that can be used for tracking.
          type: string
          xml:
            name: ReferenceNumber
        created:
          description: Date and time when the signing instance was first created.
          type: string
          format: date-time
          xml:
            name: Created
        changed:
          description: Date and time when the signing instance was last changed.
          type: string
          format: date-time
          xml:
            name: Changed
        deleted:
          description: Date and time when the signing instance will be deleted.
          type: string
          format: date-time
          xml:
            name: Deleted
        signedDocument:
          description: Signed version of the original document and its attachments.
          $ref: '#/components/schemas/Document'
          xml:
            name: SignedDocument
        signedDocumentAttachments:
          description: Signed attachments are only available in custom scenarios.
          type: array
          items:
            $ref: '#/components/schemas/Document'
          xml:
            name: SignedDocumentAttachment
        log:
          description: Event log with the events logged for the signing instance.
          $ref: '#/components/schemas/Log'
          xml:
            name: Log
        signingInstanceId:
          description: A unique ID assigned to the signing instance upon creation.
          type: string
          xml:
            attribute: true
      xml:
        namespace: 'urn:comfact:signature:3:core'
    SigningInstanceInfo:
      description: The summary representation of a signing instance resource.
      type: object
      required:
        - expires
        - accountId
        - userId
        - status
        - referenceNumber
        - created
        - changed
        - deleted
        - signingInstanceId
      properties:
        customerReferenceNumber:
          description: An optional reference that can be used for tracking.
          type: string
          xml:
            name: CustomerReferenceNumber
        expires:
          description: Date and time when the signing instance will expire.
          type: string
          format: date-time
          xml:
            name: Expires
        accountId:
          description: The unique ID of the associated account configuration.
          type: string
          xml:
            name: AccountId
        userId:
          description: The unique ID of the user that owns the signing instance.
          type: string
          xml:
            name: UserId
        groupId:
          description: The ID of the group to which the signing instance belongs.
          type: string
          xml:
            name: GroupId
        status:
          description: Indicates the overall status of the signing instance.
          $ref: '#/components/schemas/Status'
          xml:
            name: Status
        referenceNumber:
          description: A user-friendly reference that can be used for tracking.
          type: string
          xml:
            name: ReferenceNumber
        created:
          description: Date and time when the signing instance was first created.
          type: string
          format: date-time
          xml:
            name: Created
        changed:
          description: Date and time when the signing instance was last changed.
          type: string
          format: date-time
          xml:
            name: Changed
        deleted:
          description: Date and time when the signing instance will be deleted.
          type: string
          format: date-time
          xml:
            name: Deleted
        signingInstanceId:
          description: A unique ID assigned to the signing instance upon creation.
          type: string
          xml:
            attribute: true
      xml:
        namespace: 'urn:comfact:signature:3:core'
    SigningInstanceInput:
      description: The input model for creating a signing instance resource.
      type: object
      required:
        - signatories
        - document
      properties:
        customerReferenceNumber:
          description: An optional reference that can be used for tracking.
          type: string
          xml:
            name: CustomerReferenceNumber
        expires:
          description: Date and time when the signing instance will expire.
          type: string
          format: date-time
          xml:
            name: Expires
        initiator:
          description: Represents the contact person for the signing instance.
          $ref: '#/components/schemas/Initiator'
          xml:
            name: Initiator
        notificationMessages:
          description: Text messages included in notifications to signatories.
          type: array
          items:
            $ref: '#/components/schemas/Message'
          xml:
            name: NotificationMessage
        automaticReminder:
          description: Settings for sending automatic reminders to signatories.
          $ref: '#/components/schemas/AutomaticReminder'
          xml:
            name: AutomaticReminder
        signatories:
          description: Parties actively participating in signing the documents.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Signatory'
          xml:
            name: Signatory
        additionalParties:
          description: Additional parties to notify once signing is completed.
          type: array
          items:
            $ref: '#/components/schemas/Party'
          xml:
            name: AdditionalParty
        document:
          description: The main document to be approved by all the signatories.
          $ref: '#/components/schemas/Document'
          xml:
            name: Document
        documentAttachments:
          description: Any attachments to also be approved by all signatories.
          type: array
          items:
            $ref: '#/components/schemas/Document'
          xml:
            name: DocumentAttachment
        secrecySettings:
          description: Settings for document secrecy in the signing instance.
          $ref: '#/components/schemas/SecrecySettings'
          xml:
            name: SecrecySettings
        accountId:
          description: The unique ID of the associated account configuration.
          type: string
          xml:
            name: AccountId
        workflow:
          description: The order in which the signatories are allowed to sign.
          $ref: '#/components/schemas/Workflow'
          default: sequential
          xml:
            attribute: true
        language:
          description: Default text and formatting language (ISO 639, ISO 3166).
          type: string
          default: 'en-US'
          xml:
            attribute: true
      xml:
        namespace: 'urn:comfact:signature:3:core'
    SigningInstancePatch:
      description: The patch model for updating a signing instance resource.
      type: object
      properties:
        expires:
          description: Date and time when the signing instance will expire.
          type: string
          format: date-time
          xml:
            name: Expires
        status:
          description: Indicates the overall status of the signing instance.
          $ref: '#/components/schemas/StatusPatch'
          xml:
            name: Status
      xml:
        namespace: 'urn:comfact:signature:3:core'
    Status:
      description: An indicator for the overall status of a signing instance.
      type: string
      enum:
        - created
        - active
        - approved
        - declined
        - completed
        - withdrawn
        - expired
        - halted
        - faulty
      xml:
        namespace: 'urn:comfact:signature:3:core'
    StatusPatch:
      description: An indicator for updating the status of a signing instance.
      type: string
      enum:
        - active
        - withdrawn
      xml:
        namespace: 'urn:comfact:signature:3:core'
    Text:
      description: A human-readable text with a value and a language indicator.
      type: object
      required:
        - value
        - language
      properties:
        value:
          description: The textual value expressed in the indicated language.
          type: string
          xml:
            name: Value
        language:
          description: The language (ISO 639, ISO 3166) used in the text value.
          type: string
          examples: ['sv-SE']
          xml:
            attribute: true
      xml:
        namespace: 'urn:comfact:signature:3:core'
    Workflow:
      description: Defines the order in which signatories are allowed to sign.
      type: string
      enum:
        - sequential
        - parallel
      xml:
        namespace: 'urn:comfact:signature:3:core'
  securitySchemes:
    BasicAuthentication:
      description: Basic authentication (RFC 7617) with username and password.
      type: http
      scheme: basic
    OAuth2ClientCredentials:
      description: OAuth 2.0 authentication using the client credentials flow.
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: /signingservice/oauth2/token
          scopes:
            core: The scope needed for managing signing instances via this Core API.
            scim: The scope needed for managing users and groups via the SCIM API.
    BearerAuthentication:
      description: OAuth 2.0 bearer authentication (RFC 6750) with request header.
      type: http
      scheme: bearer
  examples:
    SimpleSigningInstanceInput:
      summary: Simple example of a signatory signing a document using SMS OTP.
      value:
        initiator:
          name: 'Stan S. Stanman'
          organization: 'Used Ship Emporium'
          emailAddress: 'sales@example.com'
        signatories:
          - name: 'Guybrush Threepwood'
            emailAddress: 'pirate@example.com'
            mobilePhoneNumber: '+13405552450'
            authenticationMethods: ['SmsCode']
        document:
          documentName: 'Sea Monkey'
          fileName: 'sea monkey.pdf'
          mimeType: 'application/pdf'
          content: 'JVBERi0yLjA='
    PrivacySigningInstanceInput:
      summary: Example of secrecy settings combined with download distribution.
      value:
        customerReferenceNumber: 'My Reference 1'
        expires: '2024-07-25T15:00:00Z'
        initiator:
          name: 'Bonnie Bacon'
          title: 'HR Manager'
          organization: 'Cibo E Cose'
          emailAddress: 'bonnie@example.com'
          distributionEnabled: false
        notificationMessages:
          - body: 'Si prega di rivedere e firmare il documento.'
            language: 'it-IT'
          - body: 'Vänligen granska och underteckna dokumentet.'
            language: 'sv-SE'
        automaticReminder:
          startDate: '2024-07-17T10:00:00Z'
          hourInterval: 72
          enabled: true
        signatories:
          - name: 'Roberto Ravioli'
            title: 'Saucier'
            emailAddress: 'roberto@example.com'
            partyId: 'party1'
            language: 'it-IT'
            authenticationMethods: ['SwedenConnect']
            distributionMethod: download
          - name: 'Greta Gräslök'
            title: 'CEO'
            organization: 'Cibo E Cose'
            emailAddress: 'greta@example.com'
            partyId: 'party2'
            language: 'sv-SE'
            personalNumber: '199211242426'
            authenticationMethods: ['SvensktEId']
            distributionMethod: download
        document:
          documentName: 'Employment Contract'
          fileName: 'employment contract.pdf'
          mimeType: 'application/pdf'
          content: 'JVBERi0yLjA='
          documentId: 'document1'
